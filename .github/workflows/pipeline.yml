name: Pipeline — Scrape + Send

on:
  schedule:
    - cron: '30 3 * * 1-5'   # 9:00am IST Mon–Fri
  workflow_dispatch:

env:
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  VAPI_API_KEY: ${{ secrets.VAPI_API_KEY }}
  GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
  GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
  GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
  GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
  GMAIL_ACCOUNTS: ${{ secrets.GMAIL_ACCOUNTS }}
  LINKEDIN_COOKIES_JSON: ${{ secrets.LINKEDIN_COOKIES_JSON }}
  FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
  SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
  BOOKING_LINK: ${{ secrets.BOOKING_LINK }}
  # Lead source switched SerpAPI -> Apollo (2026-06-05): the SerpAPI free quota
  # (100 searches/mo) is exhausted for the month, so we scrape Apollo.io for free
  # on top of Obscura (stealth headless Chrome) using a saved session cookie.
  # REQUIRED: set the APOLLO_COOKIES_JSON repo secret first — generate it once by
  # running `python scripts/save_apollo_cookies.py` locally and pasting the JSON.
  # Without it apollo_scraper finds 0 leads. Revert by setting LEAD_SOURCE=indeed
  # after the SerpAPI quota resets next month.
  LEAD_SOURCE: apollo
  APOLLO_COOKIES_JSON: ${{ secrets.APOLLO_COOKIES_JSON }}
  # Free-tier guard: with Apollo the cap is ~5 email-unlocks/day, so a rotating
  # 2-city window per run keeps every run inside the free allowance.
  MAX_CITIES_PER_RUN: '2'

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium

      - name: Run pipeline
        run: python pipeline.py

      - name: Commit run metrics
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add runs/latest.json runs/history.jsonl
          git diff --cached --quiet || git commit -m "chore: run metrics [skip ci]"
          git push
