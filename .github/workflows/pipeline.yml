name: Pipeline — Scrape + Send

on:
  schedule:
    - cron: '30 3 * * 1-5'   # 9:00am IST Mon–Fri
  workflow_dispatch:

env:
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  VAPI_API_KEY: ${{ secrets.VAPI_API_KEY }}
  GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
  GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
  GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
  GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
  GMAIL_ACCOUNTS: ${{ secrets.GMAIL_ACCOUNTS }}
  LINKEDIN_COOKIES_JSON: ${{ secrets.LINKEDIN_COOKIES_JSON }}
  FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
  SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
  BOOKING_LINK: ${{ secrets.BOOKING_LINK }}
  # Free-tier guard: SerpAPI free = 100 searches/month. Scrape only a rotating
  # 2-city window per run so daily runs never exhaust the monthly quota.
  MAX_CITIES_PER_RUN: '2'

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium

      - name: Run pipeline
        run: python pipeline.py

      - name: Commit run metrics
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add runs/latest.json runs/history.jsonl
          git diff --cached --quiet || git commit -m "chore: run metrics [skip ci]"
          git push
